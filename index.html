<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container">
        <div class="taskBody">
            <header>
                <h1>Task Manager</h1>
            </header>
            <div class="features">
                <input type="text"class="task" placeholder="Please enter a task">
                <div class="priority-group">
                    <label><input type="radio" name="priority" value="Low"> Low</label>
                    <label><input type="radio" name="priority" value="Medium" checked> Medium</label>
                    <label><input type="radio" name="priority" value="High"> High</label>
                </div>
                <button id="addBtn">Add task</button>
            </div>
            <hr>
            <ul class="taskList"></ul>
            <p class="analyseHeading">-:Analysing Progress:-</p>
            <analysis>
                <div class="graph">
                    <p>Completion Rate</p>
                    <strong id="dashboardCompletion">0%</strong>
                </div>
                <div class="score">
                    <p>Completed tasks</p>
                    <p id="Scoreboard">0</p>
                </div>
                <div class="High_task">
                    <p>High tasks</p>
                    <p class="high">0</p>
                </div>
                <div class="pending_task">
                    <p>Pending tasks</p>
                    <p class="pending">0</p>
                </div>
            </analysis>
        </div>
    </div>
</body>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.3.1/tsparticles.confetti.bundle.min.js"></script>  

</html>
